version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: eminence-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: eminence-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb+srv://<db_username>:<db_password>@cluster0.wn9s5me.mongodb.net/
      - DB_USERNAME=contacttolokesh22_db_user
      - DB_PASSWORD=bJYtB7O0YaoKrb0s
      - JWT_SECRET=eminenceInnovation
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./multi-level-user-management
    container_name: eminence-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
