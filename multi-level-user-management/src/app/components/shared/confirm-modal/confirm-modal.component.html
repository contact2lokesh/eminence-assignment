<div class="modal fade show d-block" tabindex="-1" role="dialog" aria-modal="true" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content shadow-lg border-0">
      <div class="modal-header border-bottom-0 pb-0">
        <h5 class="modal-title fw-bold text-dark">{{ title }}</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
      </div>
      <div class="modal-body py-4">
        <p class="mb-0 fs-5 text-secondary">{{ message }}</p>
      </div>
      <div class="modal-footer border-top-0 pt-0">
        <button type="button" class="btn btn-light border px-4" (click)="onCancel()">{{ cancelText }}</button>
        <button type="button" class="btn px-4 {{ confirmButtonClass }}" (click)="onConfirm()">{{ confirmText }}</button>
      </div>
    </div>
  </div>
</div>
